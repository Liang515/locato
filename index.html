<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LatLngLocator | 經緯度定位記錄工具</title>
  <meta name="description" content="LatLngLocator - 專門為了高頻率、高效率記錄經緯度而設計的極簡地圖工具。支援點擊選點、地址搜尋、一鍵複製與歷史紀錄儲存。">
  
  <!-- Web App Capabilities (PWA) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Locato">
  
  <!-- App Icons -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  
  <!-- Leaflet Map CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
        crossorigin="" />
        
  <!-- Local Stylesheet -->
  <link rel="stylesheet" href="style.css">

  <!-- Google Analytics (GA4) - Replace G-XXXXXXXXXX with your actual Measurement ID to enable tracking -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
</head>
<body>

  <!-- App Header -->
  <header>
    <div class="brand">
      <div class="brand-icon">
        <i data-lucide="map-pin"></i>
      </div>
      <h1>LatLngLocator</h1>
      <span>v1.0</span>
    </div>

    <!-- Address / Landmark Search -->
    <div class="search-container">
      <div class="search-form" id="search-form">
        <input type="search" 
               id="search-input" 
               class="search-input" 
               placeholder="搜尋地址、地標或城市..." 
               autocomplete="off">
        <button type="button" class="search-icon-btn" id="search-btn" aria-label="搜尋">
          <i data-lucide="search"></i>
        </button>
        <button type="button" class="clear-search-btn" id="clear-search-btn" aria-label="清除搜尋">
          <i data-lucide="x"></i>
        </button>
      </div>
      <!-- Suggestions Autocomplete List -->
      <ul class="suggestions-list" id="suggestions-list"></ul>
    </div>

    <!-- Header Actions -->
    <div class="header-actions">
      <!-- Layer Switcher Header Buttons -->
      <div class="layer-switcher-header">
        <button type="button" 
                class="layer-header-btn active" 
                id="layer-osm-btn" 
                title="切換至一般地圖" 
                aria-label="切換至一般地圖">
          <i data-lucide="map"></i>
          <span>一般地圖</span>
        </button>
        <button type="button" 
                class="layer-header-btn" 
                id="layer-sat-btn" 
                title="切換至衛星影像" 
                aria-label="切換至衛星影像">
          <i data-lucide="globe"></i>
          <span>衛星影像</span>
        </button>
      </div>

      <!-- Toggle History Drawer Button -->
      <button type="button" 
              class="header-btn" 
              id="toggle-history-btn" 
              title="歷史紀錄" 
              aria-label="打開歷史紀錄">
        <i data-lucide="history"></i>
      </button>
      
      <!-- Theme Switcher Button -->
      <button type="button" 
              class="header-btn" 
              id="theme-toggle-btn" 
              title="切換主題" 
              aria-label="切換深淺色主題">
        <i data-lucide="sun"></i>
      </button>
    </div>
  </header>

  <!-- Main Viewport -->
  <main class="app-container">
    
    <!-- Map Viewport -->
    <div id="map" class="map-viewport"></div>

    <!-- Floating Geolocation Button -->
    <button type="button" class="floating-locate-btn glass-panel" id="locate-btn" title="我的位置" aria-label="定位到我的位置">
      <i data-lucide="locate"></i>
    </button>

    <!-- Collapsible Left Sidebar (History Drawer) -->
    <div class="history-drawer glass-panel" id="history-drawer">
      <div class="history-header">
        <h2 class="history-title">
          <i data-lucide="clock"></i> 歷史紀錄
        </h2>
        <button type="button" class="history-close-btn" id="close-history-btn" aria-label="關閉歷史紀錄">
          <i data-lucide="chevron-left"></i>
        </button>
      </div>
      
      <!-- History Records list -->
      <div class="history-list" id="history-list">
        <!-- Dynamic history items will be loaded here -->
        <div class="history-empty-state" id="history-empty-state">
          <i data-lucide="map"></i>
          <p>尚無紀錄<br>每次複製座標都會記錄在這裡喔！</p>
        </div>
      </div>
      
      <!-- History Actions Footer -->
      <div class="history-footer">
        <button type="button" class="history-footer-btn" id="clear-all-btn">
          <i data-lucide="trash-2"></i> 清除全部
        </button>
        <button type="button" class="history-footer-btn primary" id="export-csv-btn">
          <i data-lucide="download"></i> 匯出 CSV
        </button>
      </div>
    </div>

    <!-- Floating Coordinate Info Panel (Right Sidebar) -->
    <section class="floating-coord-panel glass-panel" aria-label="當前座標面板">
      <div class="panel-header">
        <h2 class="panel-title">
          <i data-lucide="navigation"></i> 經緯度座標
        </h2>
        <button type="button" class="panel-toggle-btn" id="panel-toggle-btn" aria-label="收合面板">
          <i data-lucide="chevron-down"></i>
        </button>
      </div>

      <!-- Coord display details -->
      <div class="coord-display-box">
        <div class="coord-row">
          <span class="coord-label">緯度 Latitude</span>
          <div class="coord-value-click" id="lat-val" title="點擊複製緯度">
            <span class="val">25.030000</span>
            <i data-lucide="copy"></i>
          </div>
        </div>
        
        <div class="coord-row">
          <span class="coord-label">經度 Longitude</span>
          <div class="coord-value-click" id="lng-val" title="點擊複製經度">
            <span class="val">121.560000</span>
            <i data-lucide="copy"></i>
          </div>
        </div>

        <!-- Precision Selector -->
        <div class="precision-container">
          <label for="precision-select" class="precision-label">小數點精度</label>
          <select id="precision-select" class="precision-selector">
            <option value="4">4 位數</option>
            <option value="5">5 位數</option>
            <option value="6" selected>6 位數 (預設)</option>
            <option value="7">7 位數</option>
            <option value="8">8 位數</option>
          </select>
        </div>
      </div>

      <!-- Copy Action Buttons -->
      <div class="copy-actions-container">
        <button type="button" class="btn-primary-copy" id="btn-copy-latlng">
          <i data-lucide="copy"></i> 複製 緯度, 經度
        </button>
      </div>

      <!-- Address information逆查 -->
      <div class="address-info-box">
        <i data-lucide="map-pin"></i>
        <div class="address-text" id="address-text">
          <span class="address-empty">點擊地圖或搜尋地址即可查看位置描述...</span>
        </div>
      </div>
    </section>



  </main>

  <!-- Success Copy Toast Notification -->
  <div class="toast-notification" id="toast-notification" role="status" aria-live="polite">
    <i data-lucide="check-circle-2"></i>
    <span id="toast-message">已複製到剪貼簿！</span>
  </div>

  <!-- Leaflet Map JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
          crossorigin=""></script>
          
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Local Application Script -->
  <script src="app.js"></script>
</body>
</html>
